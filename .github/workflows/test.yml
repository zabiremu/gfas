name: Test

on:
  push:
    branches-ignore: [main] # main is covered by deploy.yml's embedded test job
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: amovix
          POSTGRES_PASSWORD: amovix123
          POSTGRES_DB: amovix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://amovix:amovix123@localhost:5432/amovix_test
      JWT_SECRET: ci-jwt-secret-not-for-production
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret-not-for-production
      STORAGE_DRIVER: local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e
