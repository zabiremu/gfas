services:
  redis:
    image: redis:7-alpine
    container_name: gfas_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - gfas

  backend:
    image: gfas-backend:latest
    container_name: gfas_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      # Supabase (Postgres, Singapore region, Transaction Pooler) connection string.
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - gfas

  frontend:
    image: gfas-frontend:latest
    container_name: gfas_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
    networks:
      - gfas

  nginx:
    image: nginx:1.27-alpine
    container_name: gfas_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - gfas

volumes:
  redis_data:
  backend_uploads:

networks:
  gfas:
    driver: bridge
