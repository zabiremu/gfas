services:
  postgres:
    image: postgres:15-alpine
    container_name: gfas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gfas

  redis:
    image: redis:7-alpine
    container_name: gfas_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - gfas

  backend:
    image: gfas-backend:latest
    container_name: gfas_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      # Prefer an explicit DATABASE_URL secret; fall back to the compose values.
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - gfas

  frontend:
    image: gfas-frontend:latest
    container_name: gfas_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
    networks:
      - gfas

  nginx:
    image: nginx:1.27-alpine
    container_name: gfas_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - gfas

volumes:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  gfas:
    driver: bridge
